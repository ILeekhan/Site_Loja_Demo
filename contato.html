<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Site Loja Demo</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsivo.css">
</head>
<body>
    <div class="fundo-gradiente"></div>

    <header>
        <div class="container">
            <h1>🏪 Site Loja Demo</h1>
            <nav>
                <a href="menu.html">Menu</a>
                <a href="home.html">Início</a>
                <a href="produtos.html">Produtos</a>
                <a href="sobre.html">Sobre</a>
                <a href="contato.html" class="ativo">Contato</a>
                <a href="index.html">Sair</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2>📞 Fale Conosco</h2>

        <div class="cartao">
            <h3>Formas de Contato</h3>
            <p><strong>Email:</strong> contato@lojademo.com.br</p>
            <p><strong>WhatsApp:</strong> +55 51 98118-6784</p>
            <p><strong>Horário de atendimento:</strong> Segunda a Sexta, das 8h às 18h</p>
        </div>

        <div class="cartao">
            <h3>Envie uma mensagem</h3>
            <!-- Adicionei o "onsubmit" para não recarregar a página -->
            <form onsubmit="return enviarMensagem()">
                <div class="grupo-campo">
                    <input type="text" placeholder="Seu nome" required>
                </div>
                <div class="grupo-campo">
                    <input type="email" placeholder="Seu e-mail" required>
                </div>
                <div class="grupo-campo">
                    <textarea rows="4" placeholder="Sua mensagem..." required></textarea>
                </div>
                <button type="submit" class="botao-principal">Enviar</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Site Loja Demo | Projeto de demonstração</p>
        </div>
    </footer>

    <!-- ✅ Caminho CORRETO: tudo minúsculo -->
    <script src="assets/js/script.js"></script>

    <!-- Função para simular envio -->
    <script>
        function enviarMensagem() {
            alert("✅ Mensagem enviada com sucesso! (Esta é uma demonstração)");
            return false; // Impede que a página recarregue
        }
    </script>
</body>
</html>
